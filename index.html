<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Cat Breeds</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="cat-container">
        <div class="cat-breed">
            <img src="https://images.freeimages.com/images/large-previews/4bd/black-cat-1383472.jpg" alt="Breed 1">
            <h3>Bombay cat</h3>
            <p>This is a cat with black fur.</p>
            <a href="#">Learn More</a>
        </div>
        <div class="cat-breed">
            <img src="https://images.freeimages.com/images/large-previews/f19/maine-coon-cat-1542262.jpg" alt="Breed 2">
            <h3>American wirehair</h3>
            <p>This is a cat with grey and white fur.</p>
            <a href="#">Learn More</a>
        </div>
        <div class="cat-breed">
            <img src="https://images.freeimages.com/images/large-previews/bd1/cat-1404368.jpg" alt="Breed 3">
            <h3>Turkish Van</h3>
            <p>This is a cat with orange and white fur.</p>
            <a href="#">Learn More</a>
        </div>
    </div>
